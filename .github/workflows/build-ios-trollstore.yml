name: build-ios-trollstore-ipa

on:
  workflow_dispatch:
    inputs:
      build_name:
        description: 'Version name, for example 2.0.22'
        required: false
      build_number:
        description: 'Build number, for example 33'
        required: false

jobs:
  build-ios:
    name: Build iOS IPA for TrollStore
    runs-on: macos-15
    timeout-minutes: 180
    env:
      PUB_CACHE: ${{ github.workspace }}/.pub-cache
      COCOAPODS_DISABLE_STATS: 'true'
      FLUTTER_SUPPRESS_ANALYTICS: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: stable
          cache: true

      - name: Show tool versions
        run: |
          flutter --version
          xcodebuild -version
          pod --version
          flutter --disable-analytics

      - name: Disable iOS Swift Package Manager
        run: flutter config --no-enable-swift-package-manager

      - name: Cache Dart packages
        uses: actions/cache@v4
        with:
          path: .pub-cache
          key: ${{ runner.os }}-flutter-pub-${{ hashFiles('pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-flutter-pub-

      - name: Cache CocoaPods downloads
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/CocoaPods
            ~/.cocoapods/repos
          key: ${{ runner.os }}-cocoapods-${{ hashFiles('ios/Podfile', 'pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-cocoapods-

      - name: Precache iOS artifacts
        run: flutter precache --ios

      - name: Install Flutter dependencies
        shell: bash
        run: |
          set -euo pipefail
          echo "[$(date -u '+%Y-%m-%dT%H:%M:%SZ')] Remove cached device_info_plus before pub get"
          rm -rf "$PUB_CACHE"/hosted/pub.dev/device_info_plus-* "$HOME"/.pub-cache/hosted/pub.dev/device_info_plus-* 2>/dev/null || true
          echo "[$(date -u '+%Y-%m-%dT%H:%M:%SZ')] Run flutter pub get"
          flutter pub get

      - name: Patch device_info_plus iOS Vision API
        shell: bash
        run: |
          set -euo pipefail
          echo "Applying device_info_plus iOS Vision API patch v9"

          search_roots=()
          [ -d "$PUB_CACHE" ] && search_roots+=("$PUB_CACHE")
          [ -d "$HOME/.pub-cache" ] && search_roots+=("$HOME/.pub-cache")
          plugin_file=$(find "${search_roots[@]}" -path '*/device_info_plus-*/ios/device_info_plus/Sources/device_info_plus/FPPDeviceInfoPlusPlugin.m' -type f 2>/dev/null | head -n 1 || true)
          if [ -z "$plugin_file" ]; then
            echo "device_info_plus iOS source file was not found"
            exit 1
          fi

          echo "Patching $plugin_file"
          cat > /tmp/patch_device_info_plus.rb <<'RUBY'
          path = ARGV.fetch(0)
          output = []
          skip_until_semicolon = false
          skip_vision_assignment = false

          File.readlines(path).each do |line|
            if skip_until_semicolon
              skip_until_semicolon = !line.include?(";")
              next
            end

            if skip_vision_assignment
              skip_vision_assignment = !line.include?(";")
              next
            end

            if line.include?("NSNumber *isiOSAppOnVision")
              indent = line[/^\s*/] || ""
              output << "#{indent}NSNumber *isiOSAppOnVision = @NO;\n"
              skip_until_semicolon = !line.include?(";")
              next
            end

            if line.include?("isiOSAppOnVision = @([[NSProcessInfo processInfo]")
              skip_vision_assignment = !line.include?(";")
              next
            end

            stripped = line.strip
            next if stripped == "isiOSAppOnVision]];"
            next if stripped == "isiOSAppOnVision]);"
            next if stripped == "isiOSAppOnVision]]);"

            line = line.gsub("[NSProcessInfo processInfo].isiOSAppOnVision", "NO")
            line = line.gsub("[[NSProcessInfo processInfo] isiOSAppOnVision]", "NO")
            output << line
          end

          File.write(path, output.join)
          RUBY
          sed -i '' 's/^          //' /tmp/patch_device_info_plus.rb
          ruby /tmp/patch_device_info_plus.rb "$plugin_file"

          perl -ni -e 'print unless /^\s*isiOSAppOnVision\s*=/ || /NSProcessInfo.*isiOSAppOnVision/ || /isiOSAppOnVision\]\]/ || /isiOSAppOnVision\]\)/' "$plugin_file"

          grep -n "isiOSAppOnVision" "$plugin_file" || true

          if grep -nE 'NSProcessInfo.*isiOSAppOnVision|isiOSAppOnVision\]\]|isiOSAppOnVision\]\)' "$plugin_file"; then
            echo "device_info_plus iOS Vision API patch did not fully apply"
            exit 1
          fi

      - name: Clean install CocoaPods dependencies
        shell: bash
        working-directory: ios
        timeout-minutes: 45
        run: |
          set -euo pipefail
          log() { echo "[$(date -u '+%Y-%m-%dT%H:%M:%SZ')] $*"; }

          log "Remove stale Pods and Podfile.lock"
          rm -rf Pods Podfile.lock

          log "Show CocoaPods cache size"
          du -sh "$HOME/Library/Caches/CocoaPods" "$HOME/.cocoapods/repos" 2>/dev/null || true

          log "Update CocoaPods specs repo"
          pod repo update --verbose

          log "Install Pods from fresh lock state"
          pod install --verbose

          log "Installed Pods lock summary"
          test -f Podfile.lock && sed -n '1,120p' Podfile.lock || true

          log "CocoaPods install finished"

      - name: Build iOS app without Apple signing
        shell: bash
        timeout-minutes: 150
        run: |
          set -euo pipefail
          log() { echo "[$(date -u '+%Y-%m-%dT%H:%M:%SZ')] $*"; }

          args=(ios --release --no-codesign)
          if [ -n "${{ inputs.build_name }}" ]; then
            args+=(--build-name "${{ inputs.build_name }}")
          fi
          if [ -n "${{ inputs.build_number }}" ]; then
            args+=(--build-number "${{ inputs.build_number }}")
          fi
          args+=(--no-pub)

          log "Start flutter iOS release build"
          log "Command: flutter --verbose build ${args[*]}"
          log "Console shows concise build stages; full verbose log is uploaded as artifact"

          cat > /tmp/filter_ios_build_log.awk <<'AWK'
          function keep() { print; fflush(); }
          /<!DOCTYPE plist|<plist version=|<\/plist>|<dict>|<\/dict>|<key>|<string>|<array>|<\/array>/ { next }
          /Running pod install|Running Xcode build|xcrun xcodebuild|Xcode build done|Failed to build iOS app|Building .* for device|Warning:|Error:/ { keep(); next }
          /PhaseScriptExecution|CompileSwift|SwiftCompile|CompileC|Ld |Libtool|ProcessInfoPlistFile|CopySwiftLibs|CompileAssetCatalog|Actool|Ibtool|Thin Binary|CodeSign|GenerateDSYMFile|Validate / { keep(); next }
          /(^|[[:space:]])(error:|warning:|note:)/ { keep(); next }
          AWK
          sed -i '' 's/^          //' /tmp/filter_ios_build_log.awk

          heartbeat() {
            while true; do
              sleep 60
              log "Still building; current Xcode-related processes follow"
              ps -axo pid,ppid,etime,%cpu,%mem,command | awk 'NR == 1 || /xcodebuild|XCBBuildService|swift-frontend|clang|ld|ibtool|actool|codesign|dsymutil|flutter|dart/ { print }' | head -n 80 || true
              log "Recent concise build stage lines follow"
              tail -n 80 build-ios.log 2>/dev/null || true
            done
          }

          heartbeat &
          heartbeat_pid=$!
          trap 'kill "$heartbeat_pid" 2>/dev/null || true' EXIT

          set +e
          flutter --verbose build "${args[@]}" 2>&1 | tee build-ios.raw.log | awk -f /tmp/filter_ios_build_log.awk | tee build-ios.log
          build_status=${PIPESTATUS[0]}
          set -e

          kill "$heartbeat_pid" 2>/dev/null || true

          log "Flutter build exit code: $build_status"
          log "Recent important build markers"
          grep -nE 'Running pod install|Xcode build|xcodebuild|PhaseScriptExecution|CompileSwift|CompileC|Ld |LinkStoryboards|Thin Binary|CodeSign|note:|warning:|error:' build-ios.raw.log | tail -n 300 || true

          exit "$build_status"

      - name: Upload iOS build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-logs
          path: |
            build-ios.log
            build-ios.raw.log
            ios/Podfile.lock
            ios/Pods/Manifest.lock
          retention-days: 7

      - name: Ad-hoc sign app bundle
        shell: bash
        run: |
          set -euo pipefail
          APP_PATH="build/ios/iphoneos/Runner.app"

          if [ ! -d "$APP_PATH" ]; then
            echo "Runner.app not found at $APP_PATH"
            exit 1
          fi

          if [ -d "$APP_PATH/Frameworks" ]; then
            find "$APP_PATH/Frameworks" -type f \( -perm -111 -o -name '*.dylib' \) -print0 | while IFS= read -r -d '' binary; do
              codesign --force --sign - "$binary"
            done
            find "$APP_PATH/Frameworks" -type d -name '*.framework' -print0 | while IFS= read -r -d '' framework; do
              codesign --force --sign - "$framework"
            done
          fi

          if [ -d "$APP_PATH/PlugIns" ]; then
            find "$APP_PATH/PlugIns" -type d -name '*.appex' -print0 | while IFS= read -r -d '' appex; do
              codesign --force --sign - --entitlements ios/ShareExtension/ShareExtension.entitlements "$appex"
            done
          fi

          codesign --force --sign - --entitlements ios/Runner/Runner.entitlements "$APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

      - name: Package IPA
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //; s/[`"'"']//g; s/+/-/')
          IPA_NAME="PureLive-${VERSION}-iOS14.3-TrollStore.ipa"

          rm -rf Payload "$IPA_NAME"
          mkdir Payload
          cp -R build/ios/iphoneos/Runner.app Payload/
          ditto -c -k --keepParent Payload "$IPA_NAME"

          echo "IPA_NAME=$IPA_NAME" >> "$GITHUB_ENV"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: pure-live-ios143-trollstore-ipa
          path: ${{ env.IPA_NAME }}
          retention-days: 7
