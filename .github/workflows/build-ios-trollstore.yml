name: build-ios-trollstore-ipa

on:
  workflow_dispatch:
    inputs:
      build_name:
        description: 'Version name, for example 2.0.22'
        required: false
      build_number:
        description: 'Build number, for example 33'
        required: false

jobs:
  build-ios:
    name: Build iOS IPA for TrollStore
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.3'
          channel: stable
          cache: true

      - name: Show tool versions
        run: |
          flutter --version
          xcodebuild -version
          pod --version

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build iOS app without Apple signing
        shell: bash
        run: |
          args=(ios --release --no-codesign)
          if [ -n "${{ inputs.build_name }}" ]; then
            args+=(--build-name "${{ inputs.build_name }}")
          fi
          if [ -n "${{ inputs.build_number }}" ]; then
            args+=(--build-number "${{ inputs.build_number }}")
          fi
          flutter build "${args[@]}"

      - name: Ad-hoc sign app bundle
        shell: bash
        run: |
          set -euo pipefail
          APP_PATH="build/ios/iphoneos/Runner.app"

          if [ ! -d "$APP_PATH" ]; then
            echo "Runner.app not found at $APP_PATH"
            exit 1
          fi

          if [ -d "$APP_PATH/Frameworks" ]; then
            find "$APP_PATH/Frameworks" -type f \( -perm -111 -o -name '*.dylib' \) -print0 | while IFS= read -r -d '' binary; do
              codesign --force --sign - "$binary"
            done
            find "$APP_PATH/Frameworks" -type d -name '*.framework' -print0 | while IFS= read -r -d '' framework; do
              codesign --force --sign - "$framework"
            done
          fi

          if [ -d "$APP_PATH/PlugIns" ]; then
            find "$APP_PATH/PlugIns" -type d -name '*.appex' -print0 | while IFS= read -r -d '' appex; do
              codesign --force --sign - --entitlements ios/ShareExtension/ShareExtension.entitlements "$appex"
            done
          fi

          codesign --force --sign - --entitlements ios/Runner/Runner.entitlements "$APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

      - name: Package IPA
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //; s/[`"'"']//g; s/+/-/')
          IPA_NAME="PureLive-${VERSION}-iOS14.3-TrollStore.ipa"

          rm -rf Payload "$IPA_NAME"
          mkdir Payload
          cp -R build/ios/iphoneos/Runner.app Payload/
          ditto -c -k --keepParent Payload "$IPA_NAME"

          echo "IPA_NAME=$IPA_NAME" >> "$GITHUB_ENV"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: pure-live-ios143-trollstore-ipa
          path: ${{ env.IPA_NAME }}
          retention-days: 7
